services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vibeverse
      POSTGRES_PASSWORD: vibeverse
      POSTGRES_DB: vibeverse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeverse -d vibeverse"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Vibe Rooms realtime fan-out (Phase 10). Optional in dev: the app falls
  # back to an in-process bus when REDIS_URL is unset (see server/realtime/bus.ts).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
