services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vibeverse
      POSTGRES_PASSWORD: vibeverse
      POSTGRES_DB: vibeverse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibeverse -d vibeverse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
